<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Campus Gig Board</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Hide scrollbar for mobile app feel */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">
    
    <!-- Root element for React App -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // ==========================================
        // ICON COMPONENTS (Replaces lucide-react)
        // ==========================================
        const Icon = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const Home = (p) => <Icon {...p}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></Icon>;
        const PlusCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></Icon>;
        const ClipboardList = (p) => <Icon {...p}><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></Icon>;
        const User = (p) => <Icon {...p}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Icon>;
        const Search = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></Icon>;
        const Filter = (p) => <Icon {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></Icon>;
        const ArrowLeft = (p) => <Icon {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></Icon>;
        const ShieldCheck = (p) => <Icon {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></Icon>;
        const Award = (p) => <Icon {...p}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></Icon>;
        const Star = (p) => <Icon {...p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></Icon>;
        const Coins = (p) => <Icon {...p}><circle cx="8" cy="8" r="6"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><path d="M15 6h-3a3 3 0 0 0 0 6h1a3 3 0 0 1 0 6h-3"/></Icon>;
        const MoreHorizontal = (p) => <Icon {...p}><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></Icon>;
        const Bookmark = (p) => <Icon {...p}><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></Icon>;
        const EyeOff = (p) => <Icon {...p}><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></Icon>;

        // ==========================================
        // MAIN APP COMPONENT
        // ==========================================
        function App() {
            // App routing state
            const [currentView, setCurrentView] = useState('onboarding');
            const [selectedGig, setSelectedGig] = useState(null);

            // Mock User Data
            const [user, setUser] = useState({
                name: 'Name Charan',
                email: 'student@diu.edu.bd',
                studentId: 'Student 0000',
                department: 'Department of CSE',
                points: 500,
                rating: 4.8,
                skills: ['React', 'Graphic Design']
            });

            // Mock Gigs Data (Active Feed)
            const [gigs, setGigs] = useState([
                {
                    id: 1,
                    title: 'Need a logo for my SSGuard project',
                    description: 'This is a logo for CSE321 course project. Needs to be professional and simple. I have attached some reference ideas in my mind. Need this by tomorrow.',
                    reward: 100,
                    urgency: 'High',
                    deadline: 'Oct 25, 2023',
                    posterName: 'Rahim Uddin',
                    posterRating: 4.5,
                    category: 'Design',
                    status: 'open'
                },
                {
                    id: 2,
                    title: 'Need help with Calculus II Assignment',
                    description: 'Stuck on partial derivatives. Need someone to explain and help me solve 3 math problems.',
                    reward: 50,
                    urgency: 'Medium',
                    deadline: 'Oct 26, 2023',
                    posterName: 'Karim Hasan',
                    posterRating: 4.9,
                    category: 'Academic Notes',
                    status: 'open'
                },
                {
                    id: 3,
                    title: 'Fix a bug in my React app',
                    description: 'Getting a CORS error and some useEffect infinite loops. Need an expert to fix this within today.',
                    reward: 150,
                    urgency: 'High',
                    deadline: 'Oct 24, 2023',
                    posterName: 'Nusrat Jahan',
                    posterRating: 4.2,
                    category: 'IT/Coding',
                    status: 'open'
                }
            ]);

            // Mock Transactions Data
            const [transactions, setTransactions] = useState([
                { id: 1, history: 'Logo Design for TechFest', type: 'add', point: 50 },
                { id: 2, history: 'Help with Math Assignment', type: 'add', point: 50 },
                { id: 3, history: 'Bug Fixing in Python', type: 'sub', point: 20 },
                { id: 4, history: 'Presentation Slide Design', type: 'sub', point: 50 },
            ]);

            // Handle Gig Acceptance
            const handleAcceptGig = (gig) => {
                alert('Kaj ti apni grohon korechen! (Gig Accepted)');
                setCurrentView('my-tasks');
            };

            // Main Layout Wrapper
            const Layout = ({ children, showNav = true }) => (
                <div className="w-full min-h-screen bg-gray-100 flex justify-center font-sans">
                    <div className="w-full max-w-md bg-gray-50 min-h-screen relative flex flex-col shadow-2xl overflow-hidden">
                        {/* Main Content Area */}
                        <div className="flex-1 overflow-y-auto pb-24">
                            {children}
                        </div>
                        
                        {/* Bottom Navigation */}
                        {showNav && (
                            <div className="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-200 flex justify-around items-center p-3 pb-safe z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                                <button onClick={() => setCurrentView('dashboard')} className={`flex flex-col items-center transition-colors ${currentView === 'dashboard' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}>
                                    <Home size={24} className={currentView === 'dashboard' ? 'fill-current' : ''} />
                                </button>
                                <button onClick={() => setCurrentView('my-tasks')} className={`flex flex-col items-center transition-colors ${currentView === 'my-tasks' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}>
                                    <ClipboardList size={24} />
                                </button>
                                <button onClick={() => setCurrentView('post-gig')} className="flex flex-col items-center -mt-8 bg-blue-600 text-white p-3 rounded-full shadow-lg border-4 border-gray-50 hover:bg-blue-700 hover:scale-105 transition-transform">
                                    <PlusCircle size={28} />
                                </button>
                                <button onClick={() => setCurrentView('profile')} className={`flex flex-col items-center transition-colors ${currentView === 'profile' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}>
                                    <User size={24} />
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );

            // 1. Onboarding & Authentication View
            const OnboardingView = () => {
                const skillsList = ['React', 'Graphic Design', 'Math', 'Hardware Fix', 'Business Design', 'Video Editing'];
                const [selectedSkills, setSelectedSkills] = useState(['React', 'Graphic Design']);

                const toggleSkill = (skill) => {
                    if (selectedSkills.includes(skill)) {
                        setSelectedSkills(selectedSkills.filter(s => s !== skill));
                    } else {
                        setSelectedSkills([...selectedSkills, skill]);
                    }
                };

                return (
                    <Layout showNav={false}>
                        <div className="p-6 flex flex-col min-h-screen bg-white">
                            <div className="flex justify-center mt-10 mb-8">
                                <div className="w-20 h-24 bg-blue-50 border-2 border-blue-600 rounded-b-full rounded-t-md flex items-center justify-center flex-col shadow-sm">
                                    <ShieldCheck className="text-blue-600 mb-1" size={32} />
                                    <span className="text-xs font-bold text-blue-800 tracking-wider">DIU</span>
                                </div>
                            </div>
                            
                            <div className="space-y-4 flex-1">
                                <div>
                                    <label className="text-sm font-semibold text-gray-700">University Email</label>
                                    <div className="flex items-center mt-1 border rounded-xl bg-gray-50 px-3 py-3 shadow-sm focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all">
                                        <input type="text" placeholder="student" className="bg-transparent outline-none flex-1 w-full text-sm" />
                                        <span className="text-gray-500 text-sm ml-1">@diu.edu.bd</span>
                                    </div>
                                </div>

                                <div>
                                    <label className="text-sm font-semibold text-gray-700">Student ID</label>
                                    <input type="text" placeholder="Student 0000" className="w-full mt-1 border rounded-xl bg-gray-50 px-3 py-3 outline-none focus:border-blue-500 shadow-sm focus:ring-1 focus:ring-blue-500 transition-all text-sm" />
                                </div>

                                <div>
                                    <label className="text-sm font-semibold text-gray-700">Password</label>
                                    <div className="flex items-center mt-1 border rounded-xl bg-gray-50 px-3 py-3 shadow-sm focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all">
                                        <input type="password" placeholder="••••••••" className="bg-transparent outline-none flex-1 w-full text-sm" />
                                        <EyeOff size={18} className="text-gray-400 cursor-pointer hover:text-gray-600" />
                                    </div>
                                </div>

                                <div className="pt-2">
                                    <label className="text-sm font-semibold text-gray-700">Skill Selection</label>
                                    <div className="flex flex-wrap gap-2 mt-3">
                                        {skillsList.map(skill => (
                                            <button 
                                                key={skill}
                                                onClick={() => toggleSkill(skill)}
                                                className={`px-3 py-1.5 text-[11px] font-bold rounded-full border transition-all ${selectedSkills.includes(skill) ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-50'}`}
                                            >
                                                {skill}
                                            </button>
                                        ))}
                                    </div>
                                    <p className="text-xs text-blue-600 text-center mt-4 font-semibold cursor-pointer hover:underline">Show more skills</p>
                                </div>
                            </div>

                            <div className="mt-8 space-y-4 pb-4">
                                <button onClick={() => setCurrentView('dashboard')} className="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-lg hover:bg-blue-700 active:scale-95 transition-all">
                                    Login
                                </button>
                                <p className="text-center text-sm text-blue-600 font-bold cursor-pointer hover:underline">Register</p>
                                
                                <div className="flex items-center justify-center gap-2 mt-6 p-3 bg-blue-50/50 rounded-xl border border-blue-100">
                                    <ShieldCheck className="text-blue-500" size={18} />
                                    <p className="text-xs text-blue-800 font-medium">Security and exclusive campus feel</p>
                                </div>
                            </div>
                        </div>
                    </Layout>
                );
            };

            // 2. Main Dashboard View
            const DashboardView = () => {
                return (
                    <Layout>
                        <div className="bg-white min-h-full">
                            {/* Top Widget */}
                            <div className="bg-blue-600 p-6 rounded-b-[2rem] text-white shadow-md relative overflow-hidden">
                                <div className="absolute -right-10 -top-10 w-32 h-32 bg-blue-500 rounded-full opacity-50"></div>
                                <div className="absolute top-10 -left-6 w-16 h-16 bg-blue-400 rounded-full opacity-30"></div>
                                <h2 className="text-sm font-medium opacity-90 relative z-10">Virtual Point Balance</h2>
                                <div className="flex items-center justify-between mt-1 relative z-10">
                                    <h1 className="text-4xl font-extrabold tracking-tight">{user.points} <span className="text-xl font-semibold opacity-80">VP</span></h1>
                                    <div className="bg-yellow-400 text-yellow-900 rounded-full p-2.5 shadow-lg border-2 border-yellow-300">
                                        <Coins size={28} />
                                    </div>
                                </div>
                            </div>

                            <div className="p-4 mt-2">
                                {/* Search Bar */}
                                <div className="flex gap-2 mb-5">
                                    <div className="flex-1 flex items-center bg-gray-50 rounded-xl px-4 py-3 border border-gray-200 shadow-sm focus-within:border-blue-400 focus-within:ring-1 focus-within:ring-blue-400 transition-all">
                                        <Search size={18} className="text-gray-400" />
                                        <input type="text" placeholder="Search gigs..." className="bg-transparent outline-none ml-2 w-full text-sm text-gray-700" />
                                    </div>
                                    <button className="bg-gray-50 p-3 rounded-xl border border-gray-200 text-gray-600 shadow-sm hover:bg-gray-100 transition-colors">
                                        <Filter size={20} />
                                    </button>
                                </div>

                                {/* Categories */}
                                <div className="flex gap-2.5 overflow-x-auto pb-3 scrollbar-hide">
                                    {['IT/Coding', 'Design', 'Academic Notes', 'Hardware'].map((cat, i) => (
                                        <button key={cat} className={`px-4 py-2 rounded-full text-[11px] font-bold whitespace-nowrap transition-colors shadow-sm ${i === 0 ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'}`}>
                                            {cat}
                                        </button>
                                    ))}
                                </div>

                                {/* Active Gig Feed */}
                                <div className="mt-5 space-y-4">
                                    <h3 className="font-extrabold text-gray-800 mb-3 px-1 text-lg">Active gig feed</h3>
                                    {gigs.map(gig => (
                                        <div 
                                            key={gig.id} 
                                            onClick={() => { setSelectedGig(gig); setCurrentView('gig-details'); }}
                                            className="bg-white border border-gray-100 p-4.5 rounded-2xl shadow-[0_2px_10px_rgb(0,0,0,0.04)] hover:shadow-[0_4px_15px_rgb(0,0,0,0.08)] cursor-pointer transition-all border-b-4 border-b-transparent hover:border-b-blue-500"
                                            style={{ padding: '1.25rem' }}
                                        >
                                            <div className="flex justify-between items-start">
                                                <h4 className="font-bold text-gray-800 leading-snug pr-4 text-[15px]">{gig.title}</h4>
                                                <Bookmark size={18} className={`${gig.id === 1 || gig.id === 2 ? 'text-blue-500 fill-current' : 'text-gray-300'} flex-shrink-0`} />
                                            </div>
                                            
                                            <div className="flex items-center gap-4 mt-3">
                                                <div className="flex items-center gap-1.5 bg-yellow-50 px-2.5 py-1 rounded-md border border-yellow-100">
                                                    <Coins size={14} className="text-yellow-600" />
                                                    <span className="text-[11px] font-bold text-yellow-800">{gig.reward} VP</span>
                                                </div>
                                                {gig.urgency === 'High' && (
                                                    <div className="flex items-center gap-1">
                                                        <span className="text-[10px] bg-red-50 border border-red-100 px-2 py-1 rounded text-red-600 font-bold uppercase tracking-wider">Urgent</span>
                                                    </div>
                                                )}
                                            </div>
                                            
                                            <div className="mt-4 flex justify-between items-center border-t border-gray-50 pt-3">
                                                <span className="text-xs text-gray-500 font-medium">By <span className="text-gray-800 font-semibold">{gig.posterName}</span></span>
                                                <span className="text-[11px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded">{gig.deadline}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </Layout>
                );
            };

            // 3. Gig Details View
            const GigDetailsView = () => {
                if (!selectedGig) return null;

                return (
                    <Layout showNav={false}>
                        <div className="bg-white min-h-screen flex flex-col">
                            {/* Header */}
                            <div className="flex items-center p-4 border-b border-gray-100 sticky top-0 bg-white/90 backdrop-blur-md z-10">
                                <button onClick={() => setCurrentView('dashboard')} className="p-2 -ml-2 rounded-full hover:bg-gray-100 text-gray-600 transition-colors">
                                    <ArrowLeft size={20} />
                                </button>
                                <h1 className="flex-1 text-center font-bold text-gray-800 mr-8 text-lg">Gig Details</h1>
                            </div>

                            <div className="p-5 flex-1">
                                <h2 className="text-2xl font-extrabold text-gray-900 leading-tight">{selectedGig.title}</h2>
                                
                                <div className="flex flex-wrap items-center gap-3 mt-4 mb-6">
                                    <div className="bg-yellow-50 border border-yellow-200 text-yellow-800 px-3.5 py-1.5 rounded-full text-sm font-extrabold flex items-center gap-1.5 shadow-sm">
                                        <Coins size={16} className="text-yellow-600" />
                                        {selectedGig.reward} VP
                                    </div>
                                    <div className="bg-blue-50 border border-blue-100 text-blue-700 px-3.5 py-1.5 rounded-full text-xs font-bold shadow-sm uppercase tracking-wide">
                                        {selectedGig.category}
                                    </div>
                                    <div className="text-xs text-gray-500 w-full mt-2 font-medium bg-gray-50 p-2 rounded-lg border border-gray-100 flex items-center gap-2">
                                        <span className="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                                        Deadline: <span className="font-bold text-gray-800">{selectedGig.deadline}</span>
                                    </div>
                                </div>

                                <h3 className="font-bold text-gray-800 mb-2 text-sm">Description</h3>
                                <p className="text-gray-600 text-[15px] leading-relaxed mb-8 bg-gray-50 p-4 rounded-xl border border-gray-100">
                                    {selectedGig.description}
                                </p>

                                {/* Poster Info */}
                                <h3 className="font-bold text-gray-800 mb-3 text-sm">About the Poster</h3>
                                <div className="flex items-center gap-4 bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                                    <div className="w-14 h-14 bg-gradient-to-br from-blue-100 to-blue-200 rounded-full flex items-center justify-center text-blue-800 font-extrabold text-xl shadow-inner border border-blue-300">
                                        {selectedGig.posterName.charAt(0)}
                                    </div>
                                    <div>
                                        <h4 className="font-bold text-gray-900 text-[15px]">{selectedGig.posterName}</h4>
                                        <p className="text-xs text-gray-500 font-medium">Department of CSE</p>
                                        <div className="flex items-center gap-1 mt-1.5">
                                            <Star size={12} className="text-yellow-400 fill-current" />
                                            <Star size={12} className="text-yellow-400 fill-current" />
                                            <Star size={12} className="text-yellow-400 fill-current" />
                                            <Star size={12} className="text-yellow-400 fill-current" />
                                            <Star size={12} className="text-gray-300 fill-current" />
                                            <span className="text-xs font-bold text-gray-700 ml-1">{selectedGig.posterRating}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Fixed Bottom Action */}
                            <div className="p-4 bg-white border-t border-gray-100 pb-safe sticky bottom-0">
                                <button 
                                    onClick={() => handleAcceptGig(selectedGig)}
                                    className="w-full bg-blue-600 text-white font-bold text-lg py-4 rounded-xl shadow-[0_8px_20px_rgba(37,99,235,0.25)] hover:bg-blue-700 active:scale-95 transition-all"
                                >
                                    Accept Gig
                                </button>
                            </div>
                        </div>
                    </Layout>
                );
            };

            // 4. Post a Gig View
            const PostGigView = () => {
                const [title, setTitle] = useState('');
                const [points, setPoints] = useState(100);

                const handleSubmit = () => {
                    if(title.trim() === '') {
                        alert("Doya kore kajer title din! (Please enter a title)");
                        return;
                    }
                    alert(`Kaj ti post kora hoyeche! ${points} VP reserve kora holo.`);
                    setCurrentView('dashboard');
                };

                return (
                    <Layout>
                        <div className="bg-white min-h-screen">
                            <div className="flex items-center p-4 border-b border-gray-100 sticky top-0 bg-white/90 backdrop-blur-md z-10">
                                <button onClick={() => setCurrentView('dashboard')} className="p-2 -ml-2 rounded-full hover:bg-gray-100 text-gray-600 transition-colors">
                                    <ArrowLeft size={20} />
                                </button>
                                <h1 className="flex-1 text-center font-bold text-gray-800 mr-8 text-lg">Post a Gig</h1>
                            </div>

                            <div className="p-5 space-y-6">
                                <div>
                                    <label className="font-bold text-gray-800 text-sm block mb-2">Gig Title</label>
                                    <input 
                                        type="text" 
                                        placeholder="e.g., Need presentation slides" 
                                        value={title}
                                        onChange={(e) => setTitle(e.target.value)}
                                        className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all shadow-sm"
                                    />
                                </div>

                                <div>
                                    <label className="font-bold text-gray-800 text-sm block mb-2">Description</label>
                                    <textarea 
                                        placeholder="Explain what exactly needs to be done..." 
                                        rows={5}
                                        className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all resize-none shadow-sm"
                                    ></textarea>
                                </div>

                                <div className="bg-gradient-to-b from-blue-50 to-white p-5 rounded-xl border border-blue-100 shadow-sm">
                                    <label className="font-extrabold text-gray-800 text-sm block mb-1">Point Allocation</label>
                                    <p className="text-xs text-gray-500 mb-6 font-medium">Set a point value as reward for the task.</p>
                                    
                                    <div className="flex items-center justify-between mb-3">
                                        <span className="text-lg font-black text-blue-600 bg-white px-3 py-1 rounded-lg border border-blue-100 shadow-sm">{points} VP</span>
                                        <span className="text-[11px] font-bold text-gray-500 bg-gray-100 px-2 py-1 rounded">Max: {user.points} VP</span>
                                    </div>
                                    <input 
                                        type="range" 
                                        min="10" 
                                        max={user.points} 
                                        step="10"
                                        value={points}
                                        onChange={(e) => setPoints(e.target.value)}
                                        className="w-full h-2.5 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-600 outline-none"
                                    />
                                    <div className="flex items-start gap-2 mt-4 text-[10px] text-gray-500 bg-gray-50 p-2 rounded border border-gray-100">
                                        <ShieldCheck size={14} className="text-blue-500 flex-shrink-0" />
                                        <p>This point will be held securely from your balance until the work is approved.</p>
                                    </div>
                                </div>

                                <button 
                                    onClick={handleSubmit}
                                    className="w-full bg-blue-600 text-white font-extrabold text-[15px] py-4 rounded-xl shadow-[0_4px_14px_rgba(37,99,235,0.3)] hover:bg-blue-700 hover:shadow-[0_6px_20px_rgba(37,99,235,0.4)] active:scale-95 transition-all mt-4"
                                >
                                    Publish Gig
                                </button>
                            </div>
                        </div>
                    </Layout>
                );
            };

            // 5. My Tasks View
            const MyTasksView = () => {
                const [activeTab, setActiveTab] = useState('posted'); 

                return (
                    <Layout>
                        <div className="bg-white min-h-screen">
                            <div className="p-4 border-b border-gray-100 bg-white sticky top-0 z-10 shadow-sm">
                                <h1 className="font-extrabold text-xl text-center text-gray-800 tracking-tight">My Tasks</h1>
                            </div>

                            {/* Tabs */}
                            <div className="flex bg-gray-50 p-1.5 m-4 rounded-xl border border-gray-200">
                                <button 
                                    onClick={() => setActiveTab('posted')}
                                    className={`flex-1 py-2.5 text-[13px] font-bold text-center rounded-lg transition-all ${activeTab === 'posted' ? 'bg-white text-blue-600 shadow border border-gray-100' : 'text-gray-500 hover:text-gray-700'}`}
                                >
                                    Tasks I Posted
                                </button>
                                <button 
                                    onClick={() => setActiveTab('doing')}
                                    className={`flex-1 py-2.5 text-[13px] font-bold text-center rounded-lg transition-all ${activeTab === 'doing' ? 'bg-white text-blue-600 shadow border border-gray-100' : 'text-gray-500 hover:text-gray-700'}`}
                                >
                                    Tasks I'm Doing
                                </button>
                            </div>

                            <div className="p-4 space-y-4 pt-0">
                                {activeTab === 'posted' ? (
                                    <div className="border border-gray-200 rounded-2xl p-5 shadow-[0_2px_10px_rgb(0,0,0,0.03)] bg-white">
                                        <div className="flex justify-between items-start">
                                            <h3 className="font-bold text-gray-800 text-[15px] leading-tight">Need a logo for my SSGuard project</h3>
                                            <MoreHorizontal size={18} className="text-gray-400 cursor-pointer" />
                                        </div>
                                        
                                        <div className="flex items-center gap-2 mt-4 bg-green-50 p-2.5 rounded-lg border border-green-100">
                                            <div className="w-7 h-7 bg-green-200 rounded-full flex items-center justify-center text-xs font-bold text-green-800 shadow-sm">Os</div>
                                            <span className="text-[13px] text-green-800 font-medium">Accepted by <span className="font-bold text-green-900">Osman</span></span>
                                        </div>

                                        <button className="w-full mt-5 bg-blue-600 text-white font-bold py-3 rounded-xl text-sm shadow hover:bg-blue-700 transition-colors">
                                            Approve & Transfer Points
                                        </button>
                                    </div>
                                ) : (
                                    <div className="border border-gray-200 rounded-2xl p-5 shadow-[0_2px_10px_rgb(0,0,0,0.03)] bg-white">
                                        <div className="flex justify-between items-start">
                                            <h3 className="font-bold text-gray-800 text-[15px] leading-tight">Need help with Calculus II</h3>
                                            <MoreHorizontal size={18} className="text-gray-400 cursor-pointer" />
                                        </div>
                                        <div className="flex items-center gap-2 mt-2">
                                            <span className="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded border border-blue-100 uppercase tracking-wider">In Progress</span>
                                            <span className="text-xs text-gray-500 font-medium">Due: Tomorrow</span>
                                        </div>
                                        
                                        <div className="mt-5 border-2 border-dashed border-gray-300 rounded-xl p-4 text-center bg-gray-50 cursor-pointer hover:bg-gray-100 transition-colors">
                                            <span className="text-[13px] font-bold text-gray-500">Provide a file or link here</span>
                                        </div>

                                        <button className="w-full mt-4 bg-gray-800 text-white font-bold py-3 rounded-xl text-sm shadow hover:bg-gray-900 transition-colors">
                                            Submit Work
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </Layout>
                );
            };

            // 6. User Profile & Ledger View
            const ProfileView = () => {
                return (
                    <Layout>
                        <div className="bg-gray-50 min-h-screen">
                            {/* Header/Banner */}
                            <div className="bg-blue-600 pt-6 pb-24 px-4 relative rounded-b-[2.5rem] shadow-md overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-blue-500 rounded-full opacity-30 -mr-10 -mt-10"></div>
                                <div className="flex items-center justify-between text-white relative z-10">
                                    <button onClick={() => setCurrentView('dashboard')} className="p-1 hover:bg-blue-500 rounded-full transition-colors"><ArrowLeft size={24}/></button>
                                    <h1 className="font-extrabold text-lg tracking-wide">Profile</h1>
                                    <button className="p-1 hover:bg-blue-500 rounded-full transition-colors"><MoreHorizontal size={24}/></button>
                                </div>
                            </div>

                            {/* Profile Card */}
                            <div className="px-5 -mt-20 relative z-10">
                                <div className="bg-white rounded-3xl shadow-xl p-6 flex flex-col items-center text-center border border-gray-100">
                                    <div className="w-24 h-24 bg-blue-50 rounded-full border-[5px] border-white shadow-md flex items-center justify-center -mt-14 overflow-hidden relative">
                                        <User size={48} className="text-blue-400 mt-2" />
                                    </div>
                                    <h2 className="font-black text-xl text-gray-900 mt-3">{user.name}</h2>
                                    <p className="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded mt-1">{user.department}</p>
                                    
                                    <div className="mt-4 text-[11px] font-bold text-gray-400 uppercase tracking-widest">Average rating</div>
                                    <div className="flex items-center justify-center gap-1 mt-1 bg-gray-50 px-4 py-1.5 rounded-full border border-gray-100">
                                        <Star size={14} className="text-yellow-400 fill-current drop-shadow-sm" />
                                        <Star size={14} className="text-yellow-400 fill-current drop-shadow-sm" />
                                        <Star size={14} className="text-yellow-400 fill-current drop-shadow-sm" />
                                        <Star size={14} className="text-yellow-400 fill-current drop-shadow-sm" />
                                        <Star size={14} className="text-yellow-400 fill-current opacity-50 drop-shadow-sm" />
                                        <span className="text-sm font-black text-gray-800 ml-2">{user.rating}</span>
                                    </div>
                                </div>
                            </div>

                            <div className="p-5">
                                {/* Badges/Achievements */}
                                <div className="flex items-center justify-between mb-3">
                                    <h3 className="font-extrabold text-gray-800 text-[15px]">Badges</h3>
                                    <span className="text-xs font-bold text-blue-600 cursor-pointer">View All</span>
                                </div>
                                <div className="flex justify-between gap-3 mb-8 bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                                    <div className="flex flex-col items-center w-1/3">
                                        <div className="w-12 h-12 bg-gradient-to-br from-blue-50 to-blue-100 rounded-full flex items-center justify-center border border-blue-200 shadow-sm">
                                            <Award size={20} className="text-blue-600" />
                                        </div>
                                        <span className="text-[10px] font-extrabold text-gray-700 mt-2 text-center leading-tight">Top<br/>Contributor</span>
                                    </div>
                                    <div className="flex flex-col items-center w-1/3">
                                        <div className="w-12 h-12 bg-gradient-to-br from-red-50 to-red-100 rounded-full flex items-center justify-center border border-red-200 shadow-sm relative">
                                            <div className="w-5 h-5 bg-red-500 rotate-45 rounded-sm flex items-center justify-center shadow-sm">
                                                <div className="w-1.5 h-1.5 bg-white rounded-full"></div>
                                            </div>
                                        </div>
                                        <span className="text-[10px] font-extrabold text-gray-700 mt-2 text-center leading-tight">Design<br/>Guru</span>
                                    </div>
                                    <div className="flex flex-col items-center w-1/3">
                                        <div className="w-12 h-12 bg-gradient-to-br from-yellow-50 to-yellow-100 rounded-full flex items-center justify-center border border-yellow-200 shadow-sm">
                                            <ShieldCheck size={20} className="text-yellow-600" />
                                        </div>
                                        <span className="text-[10px] font-extrabold text-gray-700 mt-2 text-center leading-tight">Trusted<br/>Member</span>
                                    </div>
                                </div>

                                {/* Transaction Ledger */}
                                <h3 className="font-extrabold text-gray-800 mb-3 text-[15px]">Transaction Ledger</h3>
                                <div className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden mb-4">
                                    <div className="flex justify-between p-3 border-b border-gray-100 bg-gray-50 text-[11px] font-black text-gray-500 uppercase tracking-wider">
                                        <span>History</span>
                                        <span>Point</span>
                                    </div>
                                    <div className="divide-y divide-gray-100">
                                        {transactions.map(trx => (
                                            <div key={trx.id} className="flex justify-between p-3.5 text-sm items-center hover:bg-gray-50 transition-colors">
                                                <span className="text-gray-600 font-medium text-[13px] pr-4">
                                                    <span className={trx.type === 'add' ? 'text-green-600 font-extrabold bg-green-50 px-1.5 py-0.5 rounded' : 'text-red-500 font-extrabold bg-red-50 px-1.5 py-0.5 rounded'}>
                                                        {trx.type === 'add' ? `+${trx.point}` : `-${trx.point}`}
                                                    </span> for {trx.history}
                                                </span>
                                                <span className={`font-black text-sm flex-shrink-0 ${trx.type === 'add' ? 'text-green-600' : 'text-red-500'}`}>
                                                    {trx.type === 'add' ? `+${trx.point}` : `-${trx.point}`}
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </Layout>
                );
            };

            // Main Render Logic
            switch (currentView) {
                case 'onboarding': return <OnboardingView />;
                case 'dashboard': return <DashboardView />;
                case 'gig-details': return <GigDetailsView />;
                case 'post-gig': return <PostGigView />;
                case 'my-tasks': return <MyTasksView />;
                case 'profile': return <ProfileView />;
                default: return <OnboardingView />;
            }
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
